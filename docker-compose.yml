services:
  postgres:
    image: postgres:17
    container_name: enterprise-rag-postgres
    environment:
      POSTGRES_DB: enterprise_rag
      POSTGRES_USER: enterprise_user
      POSTGRES_PASSWORD: enterprise_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enterprise_user -d enterprise_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: enterprise-rag-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: enterprise-rag-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
      image: prom/prometheus:latest
      container_name: enterprise-rag-prometheus

      ports:
        - "9090:9090"

      volumes:
        - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

      depends_on:
        - backend

      restart: unless-stopped

volumes:
  postgres_data:

