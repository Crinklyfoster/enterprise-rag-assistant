services:
  postgres:
    image: postgres:17
    container_name: enterprise-rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enterprise_user -d enterprise_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: enterprise-rag-backend
    volumes:
      - ./backend:/app
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: enterprise-rag-frontend
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  prometheus:
      image: prom/prometheus:latest
      container_name: enterprise-rag-prometheus

      ports:
        - "9090:9090"

      volumes:
        - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
        - prometheus_data:/prometheus

      depends_on:
        - backend

      healthcheck:
        test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
        interval: 30s
        timeout: 10s
        retries: 3

      restart: unless-stopped

  grafana:
    image: grafana/grafana:latest

    container_name: enterprise-rag-grafana

    ports:
      - "3001:3000"

    volumes:
        - grafana_data:/var/lib/grafana

    depends_on:
      - prometheus

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    restart: unless-stopped      

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile

    container_name: enterprise-rag-nginx

    ports:
      - "80:80"

    depends_on:
      - frontend
      - backend

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
  prometheus_data:

